name: Integration Tests (Gradle)

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    # Forces Docker client to speak the expected API version,
    # and prefers IPv4 (helps with ENETUNREACH/IPv6 issues on runners).
    env:
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false"

    strategy:
      fail-fast: false
      matrix:
        java: ["21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Wrapper validation was failing for you due to network timeouts/IPv6.
      # This is the official replacement and is generally more reliable.
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Docker version (debug)
        shell: bash
        run: |
          set -euxo pipefail
          docker version

      - name: Debug Docker
        run: |
          docker version
          docker info


      - name: Run integration tests
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean integrationTest --info --stacktrace

      - name: Upload integration test report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-java${{ matrix.java }}
          path: |
            **/build/reports/tests/integrationTest/**
            **/build/test-results/integrationTest/**
