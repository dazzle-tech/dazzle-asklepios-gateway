name: Integration Tests (Gradle)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['21']   # Test against both Java 17 and 21 (adjust as needed)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Docker diagnostics
        run: |
          docker version || true
          docker info || true
          docker ps -a || true
      - name: Docker diagnostics (extended)
        run: |
          set -euxo pipefail
          id
          groups
          ls -l /var/run/docker.sock || true
          echo "DOCKER_HOST=${DOCKER_HOST-<unset>}"
          docker version
          docker info
          docker ps -a



      - name: Run integration tests
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_HOST_OVERRIDE: localhost
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean integrationTest --info --stacktrace
      

      - name: Print root cause
        if: failure()
        run: |
          echo "=== ROOT CAUSE ==="
          grep -R "Caused by:" -n build/ -n || true
          echo "=== TESTCONTAINERS ==="
          grep -R "testcontainers" -n build/ -n || true

      - name: Upload integration test report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-java${{ matrix.java }}
          path: |
            **/build/reports/tests/integrationTest/**
            **/build/test-results/integrationTest/**
